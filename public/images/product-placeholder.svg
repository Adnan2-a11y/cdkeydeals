<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#F3F4F6"/>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>
  <!-- Box icon -->
  <g transform="translate(130, 120)">
    <!-- Main box body -->
    <rect x="20" y="50" width="100" height="85" rx="4" fill="url(#iconGrad)"/>
    <!-- Box top flap left -->
    <path d="M20 50 L70 30 L120 50" fill="#B0B7C3"/>
    <!-- Box top flap right -->
    <path d="M70 30 L120 50 L120 50 L70 50 Z" fill="#C4CAD4"/>
    <!-- Box center fold line -->
    <line x1="70" y1="30" x2="70" y2="50" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Box spine shadow -->
    <rect x="20" y="50" width="12" height="85" rx="2" fill="#9CA3AF" opacity="0.5"/>
    <!-- Box label area -->
    <rect x="40" y="75" width="65" height="40" rx="3" fill="white" opacity="0.4"/>
    <!-- Label lines -->
    <rect x="48" y="85" width="48" height="4" rx="2" fill="white" opacity="0.6"/>
    <rect x="48" y="95" width="35" height="4" rx="2" fill="white" opacity="0.6"/>
    <rect x="48" y="105" width="42" height="4" rx="2" fill="white" opacity="0.6"/>
  </g>
  <!-- Brand tag -->
  <text x="200" y="275" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="2">CDKEYDEALS</text>
  <text x="200" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#B0B7C3" text-anchor="middle">No image available</text>
</svg>
